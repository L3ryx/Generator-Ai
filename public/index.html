<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nano Banana Generator</title>

<style>
body{
margin:0;
font-family: Arial;
background:#0b3d02;
background-image:url("https://i.postimg.cc/FHC5G1FX/nano-banana-logo.png");
background-size:cover;
background-attachment:fixed;
text-align:center;
color:white;
}

h1{
color:red;
}

.container{
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:20px;
width:80%;
margin:auto;
margin-top:30px;
}

button{
background:red;
color:white;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
font-weight:bold;
box-shadow:0 0 15px red;
}

textarea{
width:80%;
height:120px;
margin-top:20px;
}
</style>
</head>
<body>

<h1>🔥 Nano Banana Prompt Generator</h1>

<div class="container">

<textarea id="prompt" placeholder="Enter base prompt..."></textarea>

<br>

<button onclick="optimize()">🦙 Optimize</button>
<button onclick="generateImage()">🍌 Generate Image</button>

<br>

<textarea id="optimized"></textarea>

<div id="result"></div>

</div>

<script>

async function optimize(){
const basePrompt = document.getElementById("prompt").value;

const response = await fetch("/optimize",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:basePrompt})
});

const data = await response.json();
document.getElementById("optimized").value = data.optimized;
}

async function generateImage(){
const prompt = document.getElementById("optimized").value;

const response = await fetch("/generate-image",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:prompt})
});

const data = await response.json();

document.getElementById("result").innerHTML =
`<img src="${data.image}" width="400">`;
}

</script>

</body>
</html>
