<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nano Banana AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d02;
background-image:url("https://i.postimg.cc/FHC5G1FX/nano-banana-logo.png");
background-size:cover;
background-attachment:fixed;
text-align:center;
color:white;
}

.container{
backdrop-filter: blur(15px);
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:25px;
width:80%;
margin:auto;
margin-top:60px;
box-shadow:0 0 40px black;
}

h1{
color:red;
text-shadow:0 0 15px red;
}

textarea{
width:90%;
height:120px;
border-radius:15px;
padding:15px;
border:none;
font-size:16px;
resize:none;
}

button{
background:red;
color:white;
padding:12px 20px;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
margin:10px;
box-shadow:0 0 10px red;
}

button:hover{
opacity:0.8;
}

#resultImage{
margin-top:20px;
max-width:500px;
border-radius:20px;
display:none;
box-shadow:0 0 30px black;
}

.loader{
display:none;
margin-top:20px;
font-size:18px;
color:yellow;
}

</style>
</head>
<body>

<div class="container">

<h1>🔥 Nano Banana AI</h1>

<textarea id="prompt" placeholder="Décris l’image que tu veux générer..."></textarea>

<br>

<button onclick="optimize()">🦙 Optimiser</button>
<button onclick="generate()">🍌 Générer Image</button>

<div class="loader" id="loader">
⏳ Génération en cours...
</div>

<img id="resultImage" />

</div>

<script>

/* ============================= */
/* 🔥 TON BACKEND RENDER */
/* ============================= */

const API_URL = "https://generator-ai-04o3.onrender.com";

/* ============================= */
/* 🦙 OPTIMISER AVEC LLAMA */
/* ============================= */

async function optimize(){

const prompt = document.getElementById("prompt").value;

if(!prompt){
alert("Écris un prompt !");
return;
}

const res = await fetch(API_URL + "/optimize", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ prompt })
});

const data = await res.json();

if(data.optimized){
document.getElementById("prompt").value = data.optimized;
}else{
alert("Erreur optimisation");
}

}

/* ============================= */
/* 🎨 GENERER IMAGE */
/* ============================= */

async function generate(){

const prompt = document.getElementById("prompt").value;

if(!prompt){
alert("Écris un prompt !");
return;
}

document.getElementById("loader").style.display="block";

const res = await fetch(API_URL + "/generate-image", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ prompt })
});

const data = await res.json();

const img = document.getElementById("resultImage");

if(data.image){

img.src = "data:image/png;base64," + data.image;
img.style.display="block";

}else{

alert("Erreur génération");

}

document.getElementById("loader").style.display="none";

}

</script>

</body>
</html>
