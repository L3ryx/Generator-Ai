<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nano Banana AI</title>

<style>

/* ========================= */
/* 🌿 THEME BANANA */
/* ========================= */

body{
margin:0;
font-family:Arial;
background:#0b3d02;
background-image:url("https://i.postimg.cc/FHC5G1FX/nano-banana-logo.png");
background-size:cover;
background-attachment:fixed;
text-align:center;
color:white;
}

h1{
color:red;
text-shadow:0 0 15px red;
}

.container{
backdrop-filter: blur(15px);
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
width:80%;
margin:auto;
margin-top:40px;
}

/* TEXTAREA */

textarea{
width:90%;
height:120px;
border-radius:10px;
padding:10px;
border:none;
margin:10px;
font-size:16px;
}

/* BUTTONS */

button{
background:red;
color:white;
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin:10px;
box-shadow:0 0 10px red;
}

button:hover{
opacity:0.8;
}

/* IMAGE */

img{
margin-top:20px;
max-width:500px;
border-radius:15px;
box-shadow:0 0 20px black;
}

</style>

</head>
<body>

<h1>🔥 Nano Banana Prompt Generator</h1>

<div class="container">

<h3>✍️ Base Prompt</h3>

<textarea id="prompt" placeholder="Décris l’image que tu veux générer..."></textarea>

<br>

<button onclick="optimize()">🦙 Optimiser avec Llama</button>
<button onclick="generateImage()">🍌 Générer Image</button>

<h3>✨ Résultat</h3>

<div id="result"></div>

</div>

<!-- ============================= -->
<!-- JAVASCRIPT -->
<!-- ============================= -->

<script>

/* ============================= */
/* 🦙 OPTIMISER PROMPT */
/* ============================= */

async function optimize(){

const prompt = document.getElementById("prompt").value;

const res = await fetch("/optimize",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data = await res.json();

if(data.optimized){
document.getElementById("prompt").value = data.optimized;
}else{
alert("Erreur optimisation");
}

}

/* ============================= */
/* 🎨 GENERER IMAGE */
/* ============================= */

async function generateImage(){

const prompt = document.getElementById("prompt").value;

const res = await fetch("/generate-image",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data = await res.json();

if(data.image){

document.getElementById("result").innerHTML =
`<img src="data:image/png;base64,${data.image}" />`;

}else{
alert("Erreur génération image");
}

}

</script>

</body>
</html>
